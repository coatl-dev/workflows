on:
  workflow_call:
    inputs:
      image:
        required: false
        type: string
        default: ubuntu-20.04
      python-versions:
        required: true
        type: string

jobs:
  tox:
    name: tox-${{ matrix.python-version }}-${{ inputs.image }}
    runs-on: ${{ inputs.image }}
    strategy:
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        id: py-setup
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache Python
        id: cache-python
        uses: actions/cache@v3
        with:
          path: ${{ env.pythonLocation }}
          key: py-${{ steps.py-setup.outputs.python-version }}-${{ inputs.image }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install tox-gh

      - name: Cache tox
        id: cache-tox
        uses: actions/cache@v3
        with:
          path: .tox
          key: tox-gh-${{ steps.py-setup.outputs.python-version }}-${{ inputs.image }}-${{ hashFiles('tox.ini') }}

      - name: Run tox
        run: |
          tox
